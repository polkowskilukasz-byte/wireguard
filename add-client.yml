---
- hosts: localhost
  gather_facts: false

  vars:
    wg_server_public_key: "jCIpvmKTHWDAF2GjYFuyWGja/A8PksiPPQWd1iIRXkk="
    wg_server_endpoint: "164.132.45.117:51820"

  tasks:
    - name: Utwórz katalogi
      file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - /opt/wireguard-manager
        - /opt/wireguard-manager/clients
        - /opt/wireguard-manager/mikrotik
        - /opt/wireguard-manager/backups

    - name: Ustaw zmienne klienta
      set_fact:
        c_name: "{{ client_name | default('Firma_Kowalski') }}"
        c_ip: "{{ client_ip | default('10.100.1.2') }}"
        c_lan: "{{ client_lan | default('10.0.0.0/24') }}"

    - name: Generuj klucz prywatny klienta
      shell: wg genkey
      register: client_private_key
      changed_when: true

    - name: Generuj klucz publiczny klienta
      shell: echo "{{ client_private_key.stdout }}" | wg pubkey
      register: client_public_key
      changed_when: true

    - name: Zapisz konfigurację klienta
      copy:
        dest: "/opt/wireguard-manager/clients/{{ c_name }}.conf"
        mode: "0600"
        content: |
          [Interface]
          PrivateKey = {{ client_private_key.stdout }}
          Address = {{ c_ip }}/24
          DNS = 1.1.1.1

          [Peer]
          PublicKey = {{ wg_server_public_key }}
          Endpoint = {{ wg_server_endpoint }}
          AllowedIPs = 10.100.0.0/24,{{ c_lan }}
          PersistentKeepalive = 25

    - name: Zapisz konfigurację MikroTik
      copy:
        dest: "/opt/wireguard-manager/mikrotik/{{ c_name }}.rsc"
        mode: "0600"
        content: |
          /interface wireguard add name=wg-vps mtu=1420
          /ip address add address={{ c_ip }}/24 interface=wg-vps
          /interface wireguard peers add interface=wg-vps public-key="{{ wg_server_public_key }}" endpoint-address=164.132.45.117 endpoint-port=51820 allowed-address=10.100.0.0/24 persistent-keepalive=25s

    - name: Pokaż dane klienta
      debug:
        msg:
          - "KLIENT={{ c_name }}"
          - "VPN_IP={{ c_ip }}"
          - "LAN={{ c_lan }}"
          - "PUBLIC_KEY_KLIENTA={{ client_public_key.stdout }}"
          - "PLIK_KLIENTA=/opt/wireguard-manager/clients/{{ c_name }}.conf"
          - "PLIK_MIKROTIK=/opt/wireguard-manager/mikrotik/{{ c_name }}.rsc"
